model:
  local_model_dir: "D:/models/Qwen3.5-9B"
  trust_remote_code: true
  dtype: "float16"
  device: "auto"
  device_map: "auto"
  attn_implementation: "sdpa"
  max_new_tokens: 768
  temperature: 0.1

input:
  images:
    - path: "data/freq_10k.png"
      band_id: "10k"
    - path: "data/freq_12k.png"
      band_id: "12k"
    - path: "data/freq_15k.png"
      band_id: "15k"

prompt:
  template_file: "prompts/beam_track_prompt.txt"
  extra_instruction: "Focus on targets that appear in only 2-3 bands."

matching:
  spatial_tolerance_px: 20
  min_shared_bands: 2
  max_shared_bands: 3

output:
  dir: "outputs"
  save_intermediate: true
  formats: ["json", "csv"]

